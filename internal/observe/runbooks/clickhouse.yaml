name: "ClickHouse server investigation"
type: clickhouse
aliases: [ch, clickhouse-server]
sensitivity: local
steps:
  - command: "clickhouse-client --query 'SELECT version()' 2>/dev/null || echo 'clickhouse-client not available'"
    purpose: "check ClickHouse version and connectivity"
  - command: "clickhouse-client --query 'SELECT database, table, formatReadableSize(sum(bytes_on_disk)) as size, sum(rows) as total_rows FROM system.parts WHERE active GROUP BY database, table ORDER BY sum(bytes_on_disk) DESC LIMIT 20' 2>/dev/null || echo 'cannot query parts'"
    purpose: "top tables by disk usage"
  - command: "clickhouse-client --query 'SELECT cluster, shard_num, replica_num, host_name, host_address, port, is_local FROM system.clusters ORDER BY cluster, shard_num, replica_num' 2>/dev/null || echo 'cluster topology not available'"
    purpose: "cluster topology by shard and replica"
    cluster: true
  - command: "clickhouse-client --query 'SELECT * FROM system.distributed_ddl_queue LIMIT 20' 2>/dev/null || echo 'distributed DDL queue not available'"
    purpose: "check pending distributed DDL operations"
    cluster: true
  - command: "clickhouse-client --query 'SELECT DISTINCT cluster FROM system.clusters' 2>/dev/null | while read -r cluster; do [ -z \"$cluster\" ] && continue; echo \"cluster=$cluster\"; clickhouse-client --query \"SELECT hostName() AS replica, count() AS queue_depth FROM clusterAllReplicas('$cluster', system, replication_queue) GROUP BY replica ORDER BY queue_depth DESC LIMIT 20\" 2>/dev/null || echo \"cannot query replication queue for $cluster\"; done || echo 'replication queue not available'"
    purpose: "per-replica replication queue depth across cluster"
    cluster: true
  - command: "clickhouse-client --query 'SELECT DISTINCT cluster FROM system.clusters' 2>/dev/null | while read -r cluster; do [ -z \"$cluster\" ] && continue; echo \"cluster=$cluster\"; clickhouse-client --query \"SELECT shardNum() AS shard_num, countIf(active) AS active_parts FROM clusterAllReplicas('$cluster', system, parts) GROUP BY shard_num ORDER BY shard_num\" 2>/dev/null || echo \"cannot compare shard parts for $cluster\"; done || echo 'cross-shard part comparison not available'"
    purpose: "compare active part counts across shards"
    cluster: true
  - command: "clickhouse-client --query 'SELECT DISTINCT cluster FROM system.clusters' 2>/dev/null | while read -r cluster; do [ -z \"$cluster\" ] && continue; echo \"cluster=$cluster\"; clickhouse-client --query \"SELECT shardNum() AS shard_num, formatReadableSize(sum(bytes_on_disk)) AS shard_disk_usage FROM clusterAllReplicas('$cluster', system, parts) WHERE active GROUP BY shard_num ORDER BY shard_num\" 2>/dev/null || echo \"cannot aggregate disk usage for $cluster\"; done || echo 'cluster-wide disk usage not available'"
    purpose: "aggregate active part disk usage across shards"
    cluster: true
  - command: "clickhouse-client --query 'SELECT * FROM system.replicas WHERE active_replicas < total_replicas' 2>/dev/null | head -20 || echo 'replica status not available'"
    purpose: "check replication health and lagging replicas"
  - command: "clickhouse-client --query 'SELECT query_id, user, elapsed, read_rows, memory_usage, substring(query, 1, 120) as query_preview FROM system.processes ORDER BY elapsed DESC LIMIT 10' 2>/dev/null || echo 'cannot list running queries'"
    purpose: "check long-running queries"
  - command: "clickhouse-client --query 'SELECT event_time, level, message FROM system.text_log WHERE level IN ($$Error$$, $$Fatal$$) ORDER BY event_time DESC LIMIT 30' 2>/dev/null || echo 'text_log not available'"
    purpose: "recent error and fatal log entries"
  - command: "clickhouse-client --query 'SELECT metric, value FROM system.metrics WHERE metric LIKE $$%Connection%$$ OR metric LIKE $$%Query%$$ OR metric LIKE $$%Memory%$$' 2>/dev/null || echo 'metrics not available'"
    purpose: "current connection query and memory metrics"
  - command: "clickhouse-client --query 'SELECT database, table, formatReadableSize(sum(primary_key_bytes_in_memory)) as pk_memory FROM system.parts WHERE active GROUP BY database, table ORDER BY sum(primary_key_bytes_in_memory) DESC LIMIT 10' 2>/dev/null || echo 'cannot check PK memory'"
    purpose: "tables consuming most primary key memory"
  - command: "clickhouse-client --query 'SELECT database, table, partition_id, formatReadableSize(sum(bytes_on_disk)) as size FROM system.parts WHERE active GROUP BY database, table, partition_id ORDER BY sum(bytes_on_disk) DESC LIMIT 20' 2>/dev/null || echo 'partition breakdown not available'"
    purpose: "disk usage by partition for {{SCOPE}} analysis"
  - command: "clickhouse-client --query 'SELECT * FROM system.merges LIMIT 10' 2>/dev/null || echo 'no active merges'"
    purpose: "check active merge operations"
  - command: "clickhouse-client --query 'SELECT event_time, query_duration_ms, read_rows, result_rows, memory_usage, substring(query, 1, 120) as query_preview FROM system.query_log WHERE type = 2 AND event_time > now() - INTERVAL 1 HOUR ORDER BY query_duration_ms DESC LIMIT 15' 2>/dev/null || echo 'query_log not available'"
    purpose: "slowest queries in the last hour"
