name: "MySQL/MariaDB database investigation"
type: mysql
aliases: [mariadb, db]
steps:
  - command: "systemctl status mysql 2>/dev/null || systemctl status mariadb 2>/dev/null || service mysql status 2>/dev/null || echo 'mysql service not found'"
    purpose: "check MySQL/MariaDB service status"
  - command: "mysql --version 2>/dev/null || mariadb --version 2>/dev/null || echo 'mysql client not found'"
    purpose: "identify database version"
  - command: "mysqladmin processlist 2>/dev/null | head -30 || echo 'processlist not available'"
    purpose: "list active connections and running queries"
  - command: "mysqladmin status 2>/dev/null || echo 'status not available'"
    purpose: "check uptime, threads, queries, and slow queries count"
  - command: "mysql -e 'SHOW GLOBAL STATUS LIKE \"Threads_connected\";' 2>/dev/null || echo 'connection count not available'"
    purpose: "check current connection count"
  - command: "mysql -e 'SHOW GLOBAL STATUS LIKE \"Slow_queries\";' 2>/dev/null || echo 'slow query count not available'"
    purpose: "check slow query accumulation"
  - command: "mysql -e 'SHOW SLAVE STATUS\\G' 2>/dev/null || mysql -e 'SHOW REPLICA STATUS\\G' 2>/dev/null || echo 'not a replica or replication not configured'"
    purpose: "check replication status and lag"
  - command: "mysql -e 'SHOW OPEN TABLES WHERE In_use > 0;' 2>/dev/null || echo 'no locked tables or access denied'"
    purpose: "check for table locks"
  - command: "mysql -e 'SHOW ENGINE INNODB STATUS\\G' 2>/dev/null | head -60 || echo 'InnoDB status not available'"
    purpose: "check InnoDB engine status for deadlocks and buffer pool"
  - command: "du -sh {{SCOPE}} 2>/dev/null || echo 'data directory size not available'"
    purpose: "check database data directory disk usage"
  - command: "tail -50 {{SCOPE}}/error.log 2>/dev/null || tail -50 /var/log/mysql/error.log 2>/dev/null || tail -50 /var/log/mariadb/mariadb.log 2>/dev/null || journalctl -u mysql --no-pager -n 50 2>/dev/null || echo 'no error log found'"
    purpose: "check recent error log entries"
