name: "AWS cloud infrastructure investigation"
type: cloud-infra
aliases: [aws, cloud]
steps:
  - command: "aws sts get-caller-identity 2>/dev/null || echo 'AWS CLI not configured'"
    purpose: "verify AWS credentials and account"
  - command: "aws ec2 describe-instances --filters 'Name=instance-state-name,Values=running' --query 'Reservations[].Instances[].[InstanceId,InstanceType,State.Name,PrivateIpAddress]' --output table 2>/dev/null | head -30 || echo 'cannot list instances'"
    purpose: "list running EC2 instances"
  - command: "aws ec2 describe-instances --filters 'Name=tag:Name,Values=*{{SCOPE}}*' --output table 2>/dev/null | head -30 || echo 'no instances matching scope'"
    purpose: "find instances matching target scope"
  - command: "aws ec2 describe-security-groups --query 'SecurityGroups[?length(IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]) > `0`].[GroupId,GroupName]' --output table 2>/dev/null | head -20 || echo 'cannot check security groups'"
    purpose: "find security groups open to the internet"
  - command: "aws ec2 describe-network-interfaces --filters 'Name=status,Values=available' --query 'NetworkInterfaces[].[NetworkInterfaceId,Description]' --output table 2>/dev/null | head -20 || echo 'cannot list unused ENIs'"
    purpose: "find unused network interfaces"
  - command: "aws cloudwatch describe-alarms --state-value ALARM --output table 2>/dev/null | head -30 || echo 'no active CloudWatch alarms'"
    purpose: "check active CloudWatch alarms"
  - command: "aws elbv2 describe-load-balancers --query 'LoadBalancers[].[LoadBalancerName,State.Code,DNSName]' --output table 2>/dev/null | head -20 || echo 'no load balancers'"
    purpose: "check load balancer health"
  - command: "aws rds describe-db-instances --query 'DBInstances[].[DBInstanceIdentifier,DBInstanceStatus,Engine,DBInstanceClass]' --output table 2>/dev/null | head -20 || echo 'no RDS instances'"
    purpose: "check RDS database instance status"
