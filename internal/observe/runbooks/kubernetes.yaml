name: "Kubernetes cluster investigation"
type: kubernetes
aliases: [k8s, kube]
steps:
  - command: "kubectl cluster-info 2>/dev/null || echo 'kubectl not configured'"
    purpose: "check cluster connectivity and API server"
  - command: "kubectl get nodes -o wide 2>/dev/null || echo 'cannot list nodes'"
    purpose: "check node health and resource capacity"
  - command: "kubectl get pods --all-namespaces --field-selector=status.phase!=Running 2>/dev/null | head -30 || echo 'no non-running pods'"
    purpose: "find pods not in Running state"
  - command: "kubectl get pods -n {{SCOPE}} -o wide 2>/dev/null || kubectl get pods --all-namespaces -o wide 2>/dev/null | head -40"
    purpose: "list pods in target namespace with node placement"
  - command: "kubectl get events -n {{SCOPE}} --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || echo 'no events'"
    purpose: "check recent events for warnings and errors"
  - command: "kubectl top nodes 2>/dev/null || echo 'metrics-server not available'"
    purpose: "check node CPU and memory usage"
  - command: "kubectl top pods -n {{SCOPE}} --sort-by=memory 2>/dev/null | head -20 || echo 'metrics-server not available'"
    purpose: "check pod resource consumption"
  - command: "kubectl get deployments -n {{SCOPE}} -o wide 2>/dev/null || echo 'no deployments'"
    purpose: "check deployment status and replica counts"
  - command: "kubectl get hpa -n {{SCOPE}} 2>/dev/null || echo 'no HPA configured'"
    purpose: "check horizontal pod autoscaler status"
  - command: "kubectl get pvc -n {{SCOPE}} 2>/dev/null || echo 'no persistent volume claims'"
    purpose: "check persistent storage status"
