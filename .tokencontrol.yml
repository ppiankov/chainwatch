# tokencontrol configuration
# Generated by: tokencontrol init
# Docs: https://github.com/ppiankov/tokencontrol

repos_dir: .
workers: 6
fail_fast: true
max_runtime: 30m
default_runner: codex
default_fallbacks:
    - claude
    - gemini
    - opencode
    - cline
    - qwen
runners:
    claude:
        type: claude
    cline:
        type: cline
    codex:
        type: codex
    gemini:
        type: gemini
    opencode:
        type: opencode
    qwen:
        type: qwen
